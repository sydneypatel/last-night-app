<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

            align-items: center;

            padding: 24px;
        }
        h1 {

        }

        }
        .hint {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 24px;
            margin-bottom: 0;
        }

    <h1>last night.</h1>
    <p>you've been invited to a group. get the app to join and start capturing the night.</p>
    <a class="btn" href="https://testflight.apple.com/join/NHrEKnx8">join on TestFlight</a>
